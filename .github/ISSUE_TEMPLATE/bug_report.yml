name: Bug report
description: Report a reproducible TurboJS defect
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    attributes: {label: Description}
    validations: {required: true}
  - type: textarea
    attributes: {label: Reproduction}
    validations: {required: true}
  - type: input
    attributes: {label: Commit or version}
    validations: {required: true}
  - type: textarea
    attributes: {label: Environment, description: OS, architecture, compiler, CMake, preset}
    validations: {required: true}
  - type: textarea
    attributes: {label: Logs}
